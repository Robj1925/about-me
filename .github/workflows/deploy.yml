name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build (Markdown → HTML + Inject Secrets)
        env:
          EMAIL: ${{ secrets.EMAIL }}
        run: |
          # Run the blog build (markdown → HTML, generates blog/posts.json)
          npm run build

          # Create dist directory with all site files
          mkdir dist
          cp -r assets css js index.html blog dist/

          # Inject the secret email into the JS
          sed -i "s/___CONTACT_EMAIL___/${EMAIL}/g" dist/js/main.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
