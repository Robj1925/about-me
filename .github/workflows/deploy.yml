name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build the project and Inject Secrets
        env:
          EMAIL: ${{ secrets.EMAIL }}
        run: |
          mkdir dist
          cp -r assets css js index.html dist/
          
          # This is the critical step where we inject the GitHub Secret
          # It replaces the placeholder in your Javascript with your actual email
          sed -i "s/___CONTACT_EMAIL___/${EMAIL}/g" dist/js/main.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
